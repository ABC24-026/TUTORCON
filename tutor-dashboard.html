<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tutor Dashboard – TutorCon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0A1628;--navy-mid:#132040;--gold:#D4A017;--gold-light:#F0C040;--cream:#FAF7F0;--white:#FFFFFF;--slate:#6B7A99;--green:#1A8C5B;--green-light:#22A86E;--red:#C0392B;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--navy);}
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,22,40,0.97);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:68px;border-bottom:2px solid var(--gold);}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-icon{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--navy);}
    .nav-logo span{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff;font-weight:700;}
    .con{color:var(--gold);}
    .nav-right{display:flex;align-items:center;gap:11px;}
    .user-pill{background:rgba(212,160,23,0.15);border:1px solid rgba(212,160,23,0.3);color:var(--gold);padding:5px 13px;border-radius:50px;font-size:0.8rem;font-weight:600;}
    .nav-btn{padding:6px 13px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;border:1.5px solid;text-decoration:none;display:inline-block;}
    .nb-ghost{border-color:rgba(255,255,255,0.18);color:rgba(255,255,255,0.6);background:none;}
    .nb-ghost:hover{border-color:var(--red);color:var(--red);}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;}
    .hamburger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px;transition:all 0.3s;}
    .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
    .mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;background:rgba(10,22,40,0.98);padding:20px 5%;flex-direction:column;gap:0;z-index:999;border-bottom:2px solid var(--gold);}
    .mobile-menu.open{display:flex;}
    .mobile-menu a{color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.95rem;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.07);}

    .page{margin-top:68px;padding:32px 5% 80px;max-width:1060px;margin-left:auto;margin-right:auto;}

    /* WELCOME */
    .welcome{background:var(--navy);border-radius:20px;padding:28px 32px;display:flex;align-items:center;gap:20px;margin-bottom:26px;position:relative;overflow:hidden;}
    .welcome::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(212,160,23,0.1) 0%,transparent 60%);}
    .w-av{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;flex-shrink:0;position:relative;z-index:1;}
    .w-txt{position:relative;z-index:1;flex:1;}
    .w-txt h1{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--white);margin-bottom:3px;}
    .w-txt p{color:rgba(255,255,255,0.55);font-size:0.87rem;}
    .w-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(212,160,23,0.2);border:1px solid rgba(212,160,23,0.35);color:var(--gold);padding:4px 11px;border-radius:50px;font-size:0.72rem;font-weight:700;margin-top:7px;}
    .w-badge.new-b{background:rgba(26,140,91,0.2);border-color:rgba(26,140,91,0.4);color:#4ade80;}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
    .stat-box{background:var(--white);border-radius:13px;padding:18px;border:1px solid rgba(0,0,0,0.07);text-align:center;}
    .snum{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--gold);font-weight:700;}
    .slbl{font-size:0.74rem;color:var(--slate);margin-top:3px;}

    /* TABS */
    .dash-tabs{display:flex;gap:3px;background:rgba(10,22,40,0.08);border-radius:12px;padding:4px;margin-bottom:24px;}
    .dash-tab{flex:1;padding:10px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.84rem;font-weight:600;color:var(--slate);border-radius:9px;cursor:pointer;transition:all 0.2s;text-align:center;}
    .dash-tab.active{background:var(--navy);color:var(--white);}
    .tab-panel{display:none;} .tab-panel.active{display:block;}

    /* CARDS */
    .dash-card{background:var(--white);border-radius:16px;padding:24px;border:1px solid rgba(0,0,0,0.07);margin-bottom:20px;}
    .card-title{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid rgba(212,160,23,0.2);}

    /* PROFILE PREVIEW */
    .prof-row{display:flex;align-items:center;gap:13px;margin-bottom:13px;}
    .prof-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;flex-shrink:0;}
    .prof-name{font-size:0.97rem;font-weight:700;color:var(--navy);}
    .prof-sub{font-size:0.78rem;color:var(--gold);font-weight:600;}
    .prof-inst{font-size:0.73rem;color:var(--slate);}
    .meta-line{font-size:0.82rem;color:var(--slate);line-height:1.65;margin-bottom:11px;}
    .meta-line strong{color:var(--navy);}
    .pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px;}
    .pill{background:rgba(10,22,40,0.07);padding:3px 8px;border-radius:50px;font-size:0.69rem;color:var(--slate);font-weight:500;}
    .pill.g{background:rgba(212,160,23,0.12);color:#a07800;font-weight:600;}
    .btn-view{display:inline-block;padding:8px 18px;background:var(--navy);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:0.81rem;transition:all 0.2s;}
    .btn-view:hover{background:var(--gold);color:var(--navy);}

    /* EDIT PROFILE FORM */
    .edit-form{background:var(--cream);border:1.5px solid rgba(212,160,23,0.25);border-radius:13px;padding:20px;margin-top:16px;}
    .edit-form h4{font-size:0.9rem;font-weight:700;color:var(--navy);margin-bottom:14px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .fg{margin-bottom:13px;}
    .fg label{display:block;font-size:0.78rem;font-weight:600;color:var(--navy);margin-bottom:5px;}
    .fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid rgba(10,22,40,0.13);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.86rem;color:var(--navy);background:#fff;outline:none;transition:border-color 0.2s;}
    .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);}
    .fg textarea{resize:vertical;min-height:72px;}
    .subjects-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;}
    .chip{padding:5px 12px;border:1.5px solid rgba(10,22,40,0.12);border-radius:50px;font-size:0.79rem;color:var(--slate);cursor:pointer;transition:all 0.15s;background:var(--cream);user-select:none;}
    .chip:hover{border-color:rgba(212,160,23,0.4);}
    .chip.on{border-color:var(--gold);background:rgba(212,160,23,0.1);color:#a07800;font-weight:600;}
    .save-btn{padding:10px 24px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:4px;}
    .save-btn:hover{background:var(--gold);color:var(--navy);}
    .save-ok{color:var(--green);font-size:0.82rem;margin-left:10px;display:none;}

    /* REVIEWS */
    .rev-card{background:var(--cream);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid rgba(0,0,0,0.05);}
    .rev-top{display:flex;justify-content:space-between;margin-bottom:4px;}
    .rev-name{font-weight:700;color:var(--navy);font-size:0.79rem;}
    .rev-stars{color:var(--gold);font-size:0.79rem;}
    .rev-date{font-size:0.68rem;color:var(--slate);}
    .rev-txt{font-size:0.81rem;color:var(--navy);line-height:1.5;}

    /* EMPTY REVIEW STATE */
    .empty-revs{text-align:center;padding:28px 20px;background:var(--cream);border-radius:13px;border:1.5px dashed rgba(10,22,40,0.12);}
    .empty-revs .eicon{font-size:2.4rem;margin-bottom:10px;}
    .empty-revs h4{color:var(--navy);font-size:0.95rem;font-weight:700;margin-bottom:6px;}
    .empty-revs p{color:var(--slate);font-size:0.82rem;line-height:1.6;margin-bottom:14px;}
    .empty-revs .step-list{text-align:left;background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:12px;}
    .empty-revs .step-list .st{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px;font-size:0.82rem;color:var(--slate);}
    .empty-revs .step-list .st:last-child{margin-bottom:0;}
    .empty-revs .step-list .st .sn{width:20px;height:20px;border-radius:50%;background:rgba(212,160,23,0.15);color:var(--gold);font-size:0.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .empty-revs a{display:inline-block;padding:9px 22px;background:var(--navy);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:0.83rem;transition:all 0.2s;}
    .empty-revs a:hover{background:var(--gold);color:var(--navy);}

    /* TIPS */
    .tip{display:flex;gap:10px;align-items:flex-start;padding:12px;background:var(--cream);border-radius:9px;margin-bottom:8px;}
    .tip-ic{font-size:1.15rem;flex-shrink:0;}
    .tip h4{font-size:0.83rem;font-weight:700;color:var(--navy);margin-bottom:2px;}
    .tip p{font-size:0.77rem;color:var(--slate);line-height:1.5;}

    /* PLAN */
    .plan-box{border-radius:13px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
    .plan-box.basic{background:rgba(10,22,40,0.05);border:1.5px solid rgba(10,22,40,0.1);}
    .plan-box.premium{background:rgba(212,160,23,0.08);border:1.5px solid rgba(212,160,23,0.3);}
    .plan-box h3{font-size:0.95rem;font-weight:700;color:var(--navy);}
    .plan-box p{font-size:0.78rem;color:var(--slate);margin-top:2px;}
    .upgrade-btn{padding:8px 16px;background:var(--gold);color:var(--navy);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.81rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .upgrade-btn:hover{background:var(--gold-light);}

    /* BOOKING REQUESTS */
    .bk-req{background:var(--white);border-radius:14px;border:1px solid rgba(0,0,0,0.07);padding:18px 20px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start;transition:box-shadow 0.2s;}
    .bk-req:hover{box-shadow:0 4px 18px rgba(0,0,0,0.07);}
    .req-av{width:46px;height:46px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;flex-shrink:0;}
    .req-info{flex:1;min-width:0;}
    .req-name{font-weight:700;color:var(--navy);font-size:0.93rem;margin-bottom:2px;}
    .req-meta{font-size:0.79rem;color:var(--slate);line-height:1.6;margin-bottom:7px;}
    .req-note{font-size:0.81rem;color:var(--navy);background:var(--cream);border-radius:8px;padding:8px 11px;margin-bottom:10px;line-height:1.5;border-left:3px solid var(--gold);}
    .req-actions{display:flex;gap:8px;flex-wrap:wrap;}
    .req-btn{padding:7px 16px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;border:1.5px solid;}
    .req-accept{background:var(--green);color:#fff;border-color:var(--green);}
    .req-accept:hover{background:#157a4e;}
    .req-decline{background:none;color:var(--red);border-color:rgba(192,57,43,0.35);}
    .req-decline:hover{background:var(--red);color:#fff;}
    .req-msg{background:none;color:var(--navy);border-color:rgba(10,22,40,0.2);}
    .req-msg:hover{background:var(--navy);color:#fff;}
    .req-badge{display:inline-block;padding:3px 9px;border-radius:50px;font-size:0.68rem;font-weight:700;margin-bottom:6px;}
    .rb-pending{background:rgba(212,160,23,0.15);color:#a07800;}
    .rb-confirmed{background:rgba(26,140,91,0.15);color:var(--green);}
    .rb-declined{background:rgba(192,57,43,0.1);color:var(--red);}
    .notif-dot{display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;margin-left:5px;vertical-align:middle;}

    /* MSG MODAL */
    .msg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3000;display:none;align-items:center;justify-content:center;padding:16px;}
    .msg-overlay.open{display:flex;}
    .msg-modal{background:var(--white);border-radius:18px;max-width:480px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;}
    .msg-hdr{background:var(--navy);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .msg-hdr h3{font-family:'Playfair Display',serif;color:#fff;font-size:1.1rem;}
    .msg-close{background:rgba(255,255,255,0.15);border:none;color:#fff;width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:1rem;font-weight:700;}
    .msg-thread{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:9px;}
    .msg-bubble{max-width:80%;padding:9px 13px;border-radius:12px;font-size:0.85rem;line-height:1.5;}
    .msg-bubble.mine{background:var(--navy);color:#fff;align-self:flex-end;border-radius:12px 12px 2px 12px;}
    .msg-bubble.theirs{background:var(--cream);color:var(--navy);align-self:flex-start;border-radius:12px 12px 12px 2px;}
    .msg-bubble .mt{font-size:0.67rem;opacity:0.5;margin-top:3px;text-align:right;}
    .msg-footer{padding:14px 16px;border-top:1px solid rgba(0,0,0,0.07);display:flex;gap:9px;flex-shrink:0;}
    .msg-inp{flex:1;padding:10px 13px;border:1.5px solid rgba(10,22,40,0.13);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.86rem;outline:none;}
    .msg-inp:focus{border-color:var(--gold);}
    .msg-send{padding:10px 18px;background:var(--gold);color:var(--navy);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.84rem;cursor:pointer;}

    /* DANGER */
    .danger-zone{margin-top:18px;padding:16px 18px;background:rgba(192,57,43,0.05);border:1.5px solid rgba(192,57,43,0.18);border-radius:11px;}
    .danger-zone h4{font-size:0.83rem;font-weight:700;color:var(--red);margin-bottom:4px;}
    .danger-zone p{font-size:0.77rem;color:var(--slate);margin-bottom:11px;line-height:1.55;}
    .delete-btn{padding:8px 18px;background:none;border:1.5px solid var(--red);color:var(--red);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:0.81rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .delete-btn:hover{background:var(--red);color:#fff;}

    /* CONFIRM MODAL */
    .confirm-ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px;}
    .confirm-ov.open{display:flex;}
    .confirm-box{background:#fff;border-radius:16px;padding:30px;max-width:400px;width:100%;text-align:center;}
    .confirm-box .ci{font-size:2.4rem;margin-bottom:12px;}
    .confirm-box h3{font-size:1.15rem;font-weight:700;color:var(--navy);margin-bottom:7px;}
    .confirm-box p{color:var(--slate);font-size:0.87rem;line-height:1.6;margin-bottom:22px;}
    .confirm-btns{display:flex;gap:11px;justify-content:center;}
    .btn-cancel{padding:10px 22px;border:1.5px solid rgba(10,22,40,0.18);background:none;color:var(--navy);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.86rem;font-weight:600;cursor:pointer;}
    .btn-cancel:hover{background:var(--cream);}
    .btn-del{padding:10px 22px;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.86rem;font-weight:700;cursor:pointer;}
    .btn-del:hover{background:#a93226;}

    @media(max-width:760px){.dash-grid{grid-template-columns:1fr;}.welcome{flex-direction:column;text-align:center;}.form-grid{grid-template-columns:1fr;}.hamburger{display:flex;}.nav-right .nav-btn{display:none;}}
    @media(max-width:480px){.dash-tabs{flex-wrap:wrap;}}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><div class="logo-icon">T</div><span>Tutor<span class="con">Con</span></span></a>
  <div class="nav-right">
    <span class="user-pill" id="navName">👨‍🏫 Tutor</span>
    <a href="tutors.html" class="nav-btn nb-ghost" style="color:rgba(255,255,255,0.6);">Browse</a>
    <button class="nav-btn nb-ghost" onclick="doLogout()">Log Out</button>
  </div>
  <div class="hamburger" id="burger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">🏠 Home</a>
  <a href="tutors.html">🔍 Browse Tutors</a>
  <a href="#" onclick="doLogout()" style="color:var(--red);">🚪 Log Out</a>
</div>

<div class="page" id="dashPage">
  <p style="text-align:center;color:var(--slate);margin-top:80px;">Loading…</p>
</div>

<!-- DELETE CONFIRM -->
<div class="confirm-ov" id="confirmOv">
  <div class="confirm-box">
    <div class="ci">⚠️</div>
    <h3>Delete Your Profile?</h3>
    <p>This permanently removes your listing from TutorCon. Students will no longer be able to find or book you. This cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-del" onclick="confirmDelete()">Yes, Delete</button>
    </div>
  </div>
</div>

<script>
function doLogout(){localStorage.removeItem('tc_user');location.href='index.html';}
function toggleMenu(){document.getElementById('burger').classList.toggle('open');document.getElementById('mobileMenu').classList.toggle('open');}
function openConfirm(){document.getElementById('confirmOv').classList.add('open');}
function closeConfirm(){document.getElementById('confirmOv').classList.remove('open');}
function confirmDelete(){
  const u=JSON.parse(localStorage.getItem('tc_user')||'null');
  if(!u)return;
  const all=JSON.parse(localStorage.getItem('tc_registered_tutors')||'[]');
  localStorage.setItem('tc_registered_tutors',JSON.stringify(all.filter(t=>t.id!==u.tutorId)));
  if(u.tutorId)localStorage.removeItem('tc_rev_'+u.tutorId);
  localStorage.removeItem('tc_user');
  location.href='index.html';
}

function starsHtml(r){
  if(!r||r===0)return'<span style="color:#ccc;font-size:0.8rem;">No rating yet</span>';
  return[1,2,3,4,5].map(i=>`<span style="color:${i<=Math.round(r)?'var(--gold)':'#ddd'}">${i<=Math.round(r)?'★':'☆'}</span>`).join('')+` <span style="color:var(--slate);font-size:0.78rem;">${r.toFixed(1)}/5</span>`;
}

function showTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.dash-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

function upgradePlan(){
  const u=JSON.parse(localStorage.getItem('tc_user')||'null');
  if(!u)return;
  const all=JSON.parse(localStorage.getItem('tc_registered_tutors')||'[]');
  const t=all.find(x=>x.id===u.tutorId);
  if(t){t.plan='premium';localStorage.setItem('tc_registered_tutors',JSON.stringify(all));}
  u.plan='premium';
  localStorage.setItem('tc_user',JSON.stringify(u));
  alert('✅ Upgraded to Premium! You now appear at the top of searches.');
  location.reload();
}

// ── EDIT PROFILE ─────────────────────────────────────────────
function getChosenChips(){return[...document.querySelectorAll('.chip.on')].map(c=>c.dataset.s);}
function toggleChip(el){el.classList.toggle('on');}

function saveEditedProfile(){
  const u=JSON.parse(localStorage.getItem('tc_user')||'null');
  const all=JSON.parse(localStorage.getItem('tc_registered_tutors')||'[]');
  const idx=all.findIndex(t=>t.id===u.tutorId);
  if(idx===-1){alert('Profile not found.');return;}
  const subj=getChosenChips();
  if(!subj.length){alert('Please select at least one subject.');return;}
  all[idx].subject=document.getElementById('ep-mainsubj').value||all[idx].subject;
  all[idx].rate=parseInt(document.getElementById('ep-rate').value)||all[idx].rate;
  all[idx].type=document.getElementById('ep-type').value;
  all[idx].avail=document.getElementById('ep-avail').value||all[idx].avail;
  all[idx].bio=document.getElementById('ep-bio').value||all[idx].bio;
  all[idx].subjects=subj;
  all[idx].isNew=false;
  localStorage.setItem('tc_registered_tutors',JSON.stringify(all));
  const ok=document.getElementById('saveOk');
  ok.style.display='inline';
  setTimeout(()=>{ok.style.display='none';},2500);
  location.reload();
}

// ── BOOKING REQUESTS ─────────────────────────────────────────
let activeMsgKey = null;

function getAllBookingsForTutor(tutorId) {
  const results = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('tc_bookings_')) continue;
    const studentEmail = key.replace('tc_bookings_', '');
    try {
      const bookings = JSON.parse(localStorage.getItem(key) || '[]');
      bookings.forEach(b => {
        if (b.tutorId === tutorId) results.push({...b, studentEmail, storageKey: key});
      });
    } catch(e) {}
  }
  return results.sort((a,b) => {
    if (a.status==='pending' && b.status!=='pending') return -1;
    if (b.status==='pending' && a.status!=='pending') return 1;
    return 0;
  });
}

function updateBookingStatus(storageKey, bookingId, newStatus) {
  const bookings = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const idx = bookings.findIndex(b => b.id === bookingId);
  if (idx !== -1) { bookings[idx].status = newStatus; localStorage.setItem(storageKey, JSON.stringify(bookings)); }
}

function renderBookingRequests(tutorId) {
  const el = document.getElementById('bookingReqList');
  if (!el) return;
  const reqs = getAllBookingsForTutor(tutorId);
  const pending = reqs.filter(r => r.status === 'pending').length;
  const statEl = document.getElementById('statPending');
  const dotEl  = document.getElementById('notifDot');
  if (statEl) statEl.textContent = pending;
  if (dotEl)  dotEl.style.display = pending > 0 ? 'inline-block' : 'none';

  if (!reqs.length) {
    el.innerHTML = `
      <div style="text-align:center;padding:36px 20px;background:var(--cream);border-radius:12px;border:1.5px dashed rgba(10,22,40,0.12);">
        <div style="font-size:2.2rem;margin-bottom:10px;">📅</div>
        <h4 style="color:var(--navy);font-size:0.95rem;font-weight:700;margin-bottom:6px;">No booking requests yet</h4>
        <p style="color:var(--slate);font-size:0.82rem;line-height:1.6;">When students book a session with you, their requests will appear here. Make sure your profile looks great!</p>
        <a href="tutors.html" style="display:inline-block;margin-top:14px;padding:9px 20px;background:var(--navy);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:0.82rem;">View My Listing</a>
      </div>`;
    return;
  }

  el.innerHTML = reqs.map(req => {
    const ini = (req.studentEmail || 'S')[0].toUpperCase();
    const sc = req.status==='confirmed' ? 'rb-confirmed' : req.status==='declined' ? 'rb-declined' : 'rb-pending';
    const sl = req.status==='confirmed' ? '✅ Confirmed' : req.status==='declined' ? '❌ Declined' : '⏳ Pending';
    const actions = req.status==='pending'
      ? `<button class="req-btn req-accept" onclick="acceptReq('${req.storageKey}','${req.id}')">✓ Accept</button>
         <button class="req-btn req-decline" onclick="declineReq('${req.storageKey}','${req.id}')">✕ Decline</button>
         <button class="req-btn req-msg" onclick="openTutorMsg('${req.studentEmail}')">💬 Message</button>`
      : `<button class="req-btn req-msg" onclick="openTutorMsg('${req.studentEmail}')">💬 Message Student</button>`;
    return `<div class="bk-req">
      <div class="req-av">${ini}</div>
      <div class="req-info">
        <span class="req-badge ${sc}">${sl}</span>
        <div class="req-name">${req.studentEmail}</div>
        <div class="req-meta">📅 ${req.date||'Date TBC'} &nbsp;·&nbsp; ⏰ ${req.time||'Time TBC'} &nbsp;·&nbsp; 💻 ${req.type||'TBC'}<br>🔖 Ref: <strong>${req.id}</strong></div>
        ${req.note ? `<div class="req-note">📝 "${req.note}"</div>` : ''}
        <div class="req-actions">${actions}</div>
      </div>
    </div>`;
  }).join('');
}

function acceptReq(storageKey, bookingId) {
  updateBookingStatus(storageKey, bookingId, 'confirmed');
  const u = JSON.parse(localStorage.getItem('tc_user')||'{}');
  renderBookingRequests(u.tutorId);
  showToast('✅ Booking confirmed! The student can see this in their dashboard.');
}
function declineReq(storageKey, bookingId) {
  if (!confirm('Decline this booking request?')) return;
  updateBookingStatus(storageKey, bookingId, 'declined');
  const u = JSON.parse(localStorage.getItem('tc_user')||'{}');
  renderBookingRequests(u.tutorId);
  showToast('Booking declined.');
}

// ── MESSAGING ────────────────────────────────────────────────
function openTutorMsg(studentEmail) {
  const u = JSON.parse(localStorage.getItem('tc_user')||'{}');
  activeMsgKey = 'tc_msgs_' + studentEmail + '_' + (u.tutorId || 'tutor');
  document.getElementById('msgModalTitle').textContent = '💬 ' + studentEmail;
  renderTutorThread();
  document.getElementById('tutorMsgOverlay').classList.add('open');
  setTimeout(() => { const th=document.getElementById('tutorMsgThread'); th.scrollTop=th.scrollHeight; }, 60);
}
function closeTutorMsg() { document.getElementById('tutorMsgOverlay').classList.remove('open'); activeMsgKey=null; }
function renderTutorThread() {
  if (!activeMsgKey) return;
  const msgs = JSON.parse(localStorage.getItem(activeMsgKey)||'[]');
  const el = document.getElementById('tutorMsgThread');
  if (!msgs.length) { el.innerHTML=`<div style="text-align:center;padding:24px;color:var(--slate);font-size:0.85rem;">No messages yet. Say hello!</div>`; return; }
  el.innerHTML = msgs.map(m=>`<div class="msg-bubble ${m.from==='tutor'?'mine':'theirs'}">${m.text}<div class="mt">${m.time}</div></div>`).join('');
  el.scrollTop = el.scrollHeight;
}
function sendTutorMsg() {
  if (!activeMsgKey) return;
  const inp = document.getElementById('tutorMsgInput');
  const text = inp.value.trim(); if (!text) return;
  const msgs = JSON.parse(localStorage.getItem(activeMsgKey)||'[]');
  msgs.push({from:'tutor', text, time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  localStorage.setItem(activeMsgKey, JSON.stringify(msgs));
  inp.value=''; renderTutorThread();
}

// ── TOAST ────────────────────────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('tcToast');
  if (!t) {
    t = document.createElement('div'); t.id='tcToast';
    t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 24px;border-radius:50px;font-size:0.85rem;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.2);opacity:0;transition:opacity 0.3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>{ t.style.opacity='0'; }, 2800);
}

(function(){
  const u=JSON.parse(localStorage.getItem('tc_user')||'null');
  if(!u||u.role!=='tutor'){location.href='login.html';return;}
  const reg=JSON.parse(localStorage.getItem('tc_registered_tutors')||'[]');
  let profile=reg.find(t=>t.id===u.tutorId);
  if(!profile){
    profile={id:u.tutorId||'demo_t',name:`${u.firstName||''} ${u.lastName||''}`.trim()||'Demo Tutor',ini:((u.firstName||'D')[0]+(u.lastName||'T')[0]).toUpperCase(),color:'#D4A017',tc:'#0A1628',subject:'Your Subject',inst:'Your Institution',plan:u.plan||'basic',rating:0,rate:70,type:'Both',bio:'Your bio.',subjects:[],avail:'Flexible',passRate:'New tutor',isNew:true,reviews:[]};
  }
  buildDash(u,profile);
  // Render booking requests after DOM is built
  setTimeout(() => renderBookingRequests(u.tutorId), 0);
})();
</script>

<!-- TUTOR MESSAGE MODAL -->
<div class="msg-overlay" id="tutorMsgOverlay" onclick="if(event.target===this)closeTutorMsg()">
  <div class="msg-modal">
    <div class="msg-hdr">
      <h3 id="msgModalTitle">Message</h3>
      <button class="msg-close" onclick="closeTutorMsg()">✕</button>
    </div>
    <div class="msg-thread" id="tutorMsgThread"></div>
    <div class="msg-footer">
      <input class="msg-inp" id="tutorMsgInput" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendTutorMsg()"/>
      <button class="msg-send" onclick="sendTutorMsg()">Send ✓</button>
    </div>
  </div>
</div>
