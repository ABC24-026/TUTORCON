<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tutor Dashboard – TutorCon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0A1628;--navy-mid:#132040;--gold:#D4A017;--gold-light:#F0C040;--cream:#FAF7F0;--white:#FFFFFF;--slate:#6B7A99;--green:#1A8C5B;--green-light:#22A86E;--red:#C0392B;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--navy);}

    nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,22,40,0.97);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:68px;border-bottom:2px solid var(--gold);}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-icon{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--navy);}
    .nav-logo span{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff;font-weight:700;}
    .con{color:var(--gold);}
    .nav-right{display:flex;align-items:center;gap:12px;}
    .user-pill{background:rgba(212,160,23,0.15);border:1px solid rgba(212,160,23,0.3);color:var(--gold);padding:6px 14px;border-radius:50px;font-size:0.82rem;font-weight:600;}
    .nav-btn{padding:7px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;border:1.5px solid;}
    .btn-logout{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);background:none;}
    .btn-logout:hover{border-color:var(--red);color:var(--red);}

    .page{margin-top:68px;padding:36px 5% 80px;max-width:1080px;margin-left:auto;margin-right:auto;}

    /* WELCOME */
    .welcome{background:var(--navy);border-radius:20px;padding:32px 36px;display:flex;align-items:center;gap:24px;margin-bottom:30px;position:relative;overflow:hidden;}
    .welcome::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(212,160,23,0.1) 0%,transparent 60%);}
    .w-av{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;flex-shrink:0;position:relative;z-index:1;}
    .w-txt{position:relative;z-index:1;flex:1;}
    .w-txt h1{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--white);margin-bottom:4px;}
    .w-txt p{color:rgba(255,255,255,0.6);font-size:0.9rem;}
    .w-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(212,160,23,0.2);border:1px solid rgba(212,160,23,0.35);color:var(--gold);padding:4px 13px;border-radius:50px;font-size:0.75rem;font-weight:700;margin-top:8px;}
    .w-badge.new{background:rgba(26,140,91,0.2);border-color:rgba(26,140,91,0.4);color:#4ade80;}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px;}
    .stat-box{background:var(--white);border-radius:14px;padding:20px;border:1px solid rgba(0,0,0,0.07);text-align:center;}
    .stat-box .snum{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);font-weight:700;}
    .stat-box .slbl{font-size:0.77rem;color:var(--slate);margin-top:3px;}

    /* GRID */
    .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    .dash-card{background:var(--white);border-radius:16px;padding:24px;border:1px solid rgba(0,0,0,0.07);}
    .card-title{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:15px;padding-bottom:7px;border-bottom:1px solid rgba(212,160,23,0.2);}

    /* PROFILE */
    .prof-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
    .prof-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;flex-shrink:0;}
    .prof-name{font-size:1rem;font-weight:700;color:var(--navy);}
    .prof-sub{font-size:0.8rem;color:var(--gold);font-weight:600;}
    .prof-inst{font-size:0.75rem;color:var(--slate);}
    .meta-line{font-size:0.83rem;color:var(--slate);line-height:1.65;margin-bottom:11px;}
    .meta-line strong{color:var(--navy);}
    .pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
    .pill{background:rgba(10,22,40,0.07);padding:3px 9px;border-radius:50px;font-size:0.71rem;color:var(--slate);font-weight:500;}
    .pill.g{background:rgba(212,160,23,0.12);color:#a07800;font-weight:600;}
    .btn-view{display:inline-block;padding:9px 20px;background:var(--navy);color:var(--white);border-radius:8px;text-decoration:none;font-weight:700;font-size:0.83rem;transition:all 0.2s;}
    .btn-view:hover{background:var(--gold);color:var(--navy);}

    /* REVIEWS */
    .rev-card{background:var(--cream);border-radius:10px;padding:12px;margin-bottom:9px;border:1px solid rgba(0,0,0,0.05);}
    .rev-top{display:flex;justify-content:space-between;margin-bottom:5px;}
    .rev-name{font-weight:700;color:var(--navy);font-size:0.8rem;}
    .rev-stars{color:var(--gold);font-size:0.8rem;}
    .rev-date{font-size:0.69rem;color:var(--slate);}
    .rev-txt{font-size:0.82rem;color:var(--navy);line-height:1.5;}
    .no-revs{text-align:center;padding:18px;color:var(--slate);font-size:0.85rem;background:var(--cream);border-radius:10px;}

    /* TIPS */
    .tip{display:flex;gap:11px;align-items:flex-start;padding:13px;background:var(--cream);border-radius:10px;margin-bottom:9px;}
    .tip-ic{font-size:1.2rem;flex-shrink:0;}
    .tip h4{font-size:0.85rem;font-weight:700;color:var(--navy);margin-bottom:3px;}
    .tip p{font-size:0.78rem;color:var(--slate);line-height:1.5;}

    /* PLAN */
    .plan-box{border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
    .plan-box.basic{background:rgba(10,22,40,0.05);border:1.5px solid rgba(10,22,40,0.1);}
    .plan-box.premium{background:rgba(212,160,23,0.08);border:1.5px solid rgba(212,160,23,0.3);}
    .plan-box h3{font-size:0.97rem;font-weight:700;color:var(--navy);}
    .plan-box p{font-size:0.8rem;color:var(--slate);margin-top:2px;}
    .upgrade-btn{padding:8px 18px;background:var(--gold);color:var(--navy);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .upgrade-btn:hover{background:var(--gold-light);}

    /* DANGER ZONE */
    .danger-zone{margin-top:20px;padding:18px 20px;background:rgba(192,57,43,0.05);border:1.5px solid rgba(192,57,43,0.2);border-radius:12px;}
    .danger-zone h4{font-size:0.85rem;font-weight:700;color:var(--red);margin-bottom:5px;}
    .danger-zone p{font-size:0.79rem;color:var(--slate);margin-bottom:12px;line-height:1.55;}
    .delete-btn{padding:9px 20px;background:none;border:1.5px solid var(--red);color:var(--red);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .delete-btn:hover{background:var(--red);color:#fff;}

    /* CONFIRM MODAL */
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px;}
    .confirm-overlay.open{display:flex;}
    .confirm-box{background:var(--white);border-radius:16px;padding:32px;max-width:420px;width:100%;text-align:center;}
    .confirm-box .icon{font-size:2.5rem;margin-bottom:14px;}
    .confirm-box h3{font-size:1.2rem;font-weight:700;color:var(--navy);margin-bottom:8px;}
    .confirm-box p{color:var(--slate);font-size:0.9rem;line-height:1.6;margin-bottom:24px;}
    .confirm-btns{display:flex;gap:12px;justify-content:center;}
    .btn-cancel{padding:11px 24px;border:1.5px solid rgba(10,22,40,0.2);background:none;color:var(--navy);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .btn-cancel:hover{background:var(--cream);}
    .btn-confirm-delete{padding:11px 24px;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .btn-confirm-delete:hover{background:#a93226;}

    @media(max-width:780px){.dash-grid{grid-template-columns:1fr;}.welcome{flex-direction:column;text-align:center;}}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-icon">T</div>
    <span>Tutor<span class="con">Con</span></span>
  </a>
  <div class="nav-right">
    <span class="user-pill" id="navName">👨‍🏫 Tutor</span>
    <a href="tutors.html" style="color:rgba(255,255,255,0.6);text-decoration:none;font-size:0.82rem;padding:7px 14px;border:1.5px solid rgba(255,255,255,0.15);border-radius:6px;transition:all 0.2s;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='rgba(255,255,255,0.6)'">Browse Tutors</a>
    <button class="nav-btn btn-logout" onclick="doLogout()">Log Out</button>
  </div>
</nav>

<div class="page" id="dashPage">
  <p style="text-align:center;color:var(--slate);margin-top:80px;">Loading dashboard…</p>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="icon">⚠️</div>
    <h3>Delete Your Tutor Profile?</h3>
    <p>This will permanently remove your listing from TutorCon. Students will no longer be able to find or book you. This action cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">Yes, Delete My Profile</button>
    </div>
  </div>
</div>

<script>
// ── LOGOUT → HOME ───────────────────────────────────────────
function doLogout() {
  localStorage.removeItem('tc_user');
  location.href = 'index.html'; // Always goes back to home
}

// ── DELETE PROFILE ──────────────────────────────────────────
function openConfirm()  { document.getElementById('confirmOverlay').classList.add('open'); }
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); }

function confirmDelete() {
  const u = JSON.parse(localStorage.getItem('tc_user')||'null');
  if (!u) return;

  // Remove from registered tutors list
  const all = JSON.parse(localStorage.getItem('tc_registered_tutors')||'[]');
  const updated = all.filter(t => t.id !== u.tutorId);
  localStorage.setItem('tc_registered_tutors', JSON.stringify(updated));

  // Remove their reviews
  if (u.tutorId) localStorage.removeItem('tc_rev_' + u.tutorId);

  // Log them out
  localStorage.removeItem('tc_user');

  // Redirect home
  location.href = 'index.html';
}

// ── UPGRADE PLAN ────────────────────────────────────────────
function upgradePlan() {
  const u = JSON.parse(localStorage.getItem('tc_user')||'null');
  if (!u) return;
  const all = JSON.parse(localStorage.getItem('tc_registered_tutors')||'[]');
  const t = all.find(x => x.id === u.tutorId);
  if (t) { t.plan = 'premium'; localStorage.setItem('tc_registered_tutors', JSON.stringify(all)); }
  u.plan = 'premium';
  localStorage.setItem('tc_user', JSON.stringify(u));
  alert('✅ Upgraded to Premium! You now appear at the top of student searches.');
  location.reload();
}

// ── STARS HTML ──────────────────────────────────────────────
function starsHtml(r) {
  if (!r || r === 0) return '<span style="color:#ccc;font-size:0.82rem;">No rating yet</span>';
  return [1,2,3,4,5].map(i=>`<span style="color:${i<=Math.round(r)?'var(--gold)':'#ddd'}">${i<=Math.round(r)?'★':'☆'}</span>`).join('')
    + ` <span style="color:var(--slate);font-size:0.8rem;">${r.toFixed(1)}/5</span>`;
}

// ── BUILD DASHBOARD ─────────────────────────────────────────
function buildDash(u, profile) {
  const reviews = JSON.parse(localStorage.getItem('tc_rev_' + profile.id) || 'null') || profile.reviews || [];
  const rating  = reviews.length ? +(reviews.reduce((s,r)=>s+r.stars,0)/reviews.length).toFixed(1) : 0;
  const plan    = u.plan || profile.plan || 'basic';
  const isPrem  = plan === 'premium';

  document.getElementById('navName').textContent = `👨‍🏫 ${u.firstName || 'Tutor'}`;

  document.getElementById('dashPage').innerHTML = `
    <!-- WELCOME BAND -->
    <div class="welcome">
      <div class="w-av" style="background:${profile.color};color:${profile.tc};">${profile.ini}</div>
      <div class="w-txt">
        <h1>Hey, ${u.firstName}! 👋</h1>
        <p>Your tutor profile is <strong style="color:var(--green-light);">live</strong> on TutorCon. Students can find and book you right now.</p>
        <div class="w-badge ${profile.isNew ? 'new' : ''}">${profile.isNew ? '🆕 Just joined TutorCon' : '✅ TutorCon Verified Tutor'}</div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-box"><div class="snum">${reviews.length}</div><div class="slbl">Reviews</div></div>
      <div class="stat-box"><div class="snum">${rating || '—'}</div><div class="slbl">Avg Rating</div></div>
      <div class="stat-box"><div class="snum">P${profile.rate}</div><div class="slbl">Your Rate/hr</div></div>
      <div class="stat-box"><div class="snum">${isPrem ? '⭐' : '●'}</div><div class="slbl">${isPrem ? 'Premium' : 'Basic'} Plan</div></div>
    </div>

    <!-- MAIN GRID -->
    <div class="dash-grid">

      <!-- MY PROFILE CARD -->
      <div class="dash-card">
        <div class="card-title">My Listing</div>
        <div class="prof-row">
          <div class="prof-av" style="background:${profile.color};color:${profile.tc};">${profile.ini}</div>
          <div>
            <div class="prof-name">${profile.name}</div>
            <div class="prof-sub">${profile.subject}</div>
            <div class="prof-inst">${profile.inst} · ${profile.type}</div>
          </div>
        </div>
        <div class="meta-line">
          <strong>Availability:</strong> ${profile.avail || 'Not set'}<br>
          <strong>Pass Rate:</strong> ${profile.passRate}<br>
          <strong>Rating:</strong> ${starsHtml(rating)}
        </div>
        <div class="pills">
          ${(profile.subjects || []).map(s=>`<span class="pill g">${s}</span>`).join('')}
          <span class="pill">${profile.type}</span>
        </div>
        <a href="tutors.html" class="btn-view">👁 View My Listing</a>

        <!-- DANGER ZONE -->
        <div class="danger-zone">
          <h4>⚠️ Danger Zone</h4>
          <p>Deleting your profile will remove your listing from TutorCon permanently. All your reviews will also be deleted.</p>
          <button class="delete-btn" onclick="openConfirm()">🗑 Delete My Profile</button>
        </div>
      </div>

      <!-- REVIEWS -->
      <div class="dash-card">
        <div class="card-title">Student Reviews (${reviews.length})</div>
        ${reviews.length === 0
          ? `<div class="no-revs">No reviews yet.<br><span style="font-size:0.78rem;">After your sessions, remind students to leave a review on your listing.</span></div>`
          : reviews.slice(0,5).map(r=>`
            <div class="rev-card">
              <div class="rev-top">
                <div><span class="rev-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span> <span class="rev-name">${r.name}</span></div>
                <span class="rev-date">${r.date}</span>
              </div>
              <div class="rev-txt">${r.text}</div>
            </div>`).join('')
        }
      </div>

      <!-- TIPS -->
      <div class="dash-card">
        <div class="card-title">How to Get More Bookings</div>
        <div class="tip"><div class="tip-ic">📝</div><div><h4>Keep your bio specific</h4><p>Mention exactly which modules and years you cover. Students search for very specific things.</p></div></div>
        <div class="tip"><div class="tip-ic">⚡</div><div><h4>Respond the same day</h4><p>Students often message multiple tutors. First to reply usually wins the booking.</p></div></div>
        <div class="tip"><div class="tip-ic">⭐</div><div><h4>Ask for that review</h4><p>After each session, just say "Feel free to leave me a review on TutorCon!" — most students will.</p></div></div>
        <div class="tip"><div class="tip-ic">📚</div><div><h4>Add study materials</h4><p>Premium tutors can sell notes through their profile — a passive income stream between sessions.</p></div></div>
      </div>

      <!-- PLAN + UPGRADE -->
      <div class="dash-card">
        <div class="card-title">Your Subscription</div>
        <div class="plan-box ${plan}" style="margin-bottom:16px;">
          <div>
            <h3>${isPrem ? '⭐ Premium Listing' : '● Basic Listing'}</h3>
            <p>${isPrem ? 'Top search placement + boosted visibility + premium badge' : 'Standard placement in student search'}</p>
          </div>
          <div style="text-align:right;">
            <div style="font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--gold);font-weight:700;">P${isPrem?'45':'20'}</div>
            <div style="font-size:0.72rem;color:var(--slate);">/month</div>
          </div>
        </div>
        ${!isPrem ? `
        <div style="padding:14px;background:rgba(212,160,23,0.06);border:1px solid rgba(212,160,23,0.2);border-radius:10px;margin-bottom:14px;">
          <p style="font-size:0.84rem;color:var(--navy);margin-bottom:10px;">Upgrade to <strong>Premium</strong> and appear at the top of every student search.</p>
          <button class="upgrade-btn" onclick="upgradePlan()">Upgrade to Premium · P45/mo</button>
        </div>` :
        `<div style="padding:12px;background:rgba(26,140,91,0.07);border:1px solid rgba(26,140,91,0.2);border-radius:10px;margin-bottom:14px;font-size:0.83rem;color:var(--navy);">
          ✅ You're on <strong>Premium</strong> — you appear at the top of student searches.
        </div>`}
        <a href="tutors.html" style="display:block;text-align:center;padding:11px;background:var(--navy);color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.87rem;transition:all 0.2s;" onmouseover="this.style.background='var(--gold)';this.style.color='var(--navy)'" onmouseout="this.style.background='var(--navy)';this.style.color='#fff'">
          🔍 Browse All Tutors on the Platform
        </a>
      </div>

    </div>`; // end dash-grid
}

// ── INIT ─────────────────────────────────────────────────────
(function() {
  const u = JSON.parse(localStorage.getItem('tc_user') || 'null');
  if (!u || u.role !== 'tutor') {
    location.href = 'login.html';
    return;
  }

  const registered = JSON.parse(localStorage.getItem('tc_registered_tutors') || '[]');
  let profile = registered.find(t => t.id === u.tutorId);

  // Fallback profile for demo tutor login
  if (!profile) {
    profile = {
      id: u.tutorId || 'demo_tutor',
      name: `${u.firstName||''} ${u.lastName||''}`.trim() || 'Demo Tutor',
      ini: ((u.firstName||'D')[0] + (u.lastName||'T')[0]).toUpperCase(),
      color: '#D4A017', tc: '#0A1628',
      subject: 'Your Subject Area', inst: 'Your Institution',
      plan: u.plan || 'basic', rating: 0, rate: 70, type: 'Both',
      bio: 'Your bio appears here once you complete your profile.',
      subjects: [], avail: 'Flexible', passRate: 'New tutor', isNew: true, reviews: []
    };
  }

  buildDash(u, profile);
})();
</script>
</body>
</html>
